<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTRO CITY - RolePlay Minecraft</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #0d061f;
            /* Сохраняем твой фиолетовый неоновый фон */
            background-image: radial-gradient(circle at 50% 0%, #2a0a4a 0%, #0d061f 70%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Частицы/звёзды для атмосферы (как у тебя было) */
        .stars {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(1px 1px at 10% 20%, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 30% 60%, #fff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 50% 10%, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 70% 80%, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 90% 40%, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 15% 90%, #9b59b6, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 85% 15%, #9b59b6, rgba(0,0,0,0));
            background-size: 200px 200px;
            opacity: 0.6;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 3.5rem;
            text-transform: uppercase;
            margin-bottom: 15px;
            /* Фиолетовое неоновое свечение */
            color: #d4a0ff;
            text-shadow: 0 0 20px #8a2be2, 0 0 40px #8a2be2, 0 0 60px #4b0082;
            letter-spacing: 2px;
        }

        /* Блок с текстом (из 2-го скриншота) */
        .hero-text {
            margin-bottom: 30px;
        }

        .hero-title-line {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 2rem;
            line-height: 1.2;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(138, 43, 226, 0.5);
        }

        /* Оранжевое выделение ROLEDPLAY заменили на фиолетовое, чтобы сохранить стиль */
        .highlight-word {
            color: #d4a0ff;
            text-shadow: 0 0 15px #8a2be2;
            font-weight: 900;
        }

        .description {
            font-size: 1.1rem;
            font-weight: 300;
            line-height: 1.6;
            color: #d1c4e9;
            margin-top: 20px;
            max-width: 90%;
            margin-left: auto;
            margin-right: auto;
            opacity: 0.9;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 350px;
            margin-bottom: 20px;
        }

        .btn {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 18px 20px;
            border-radius: 12px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        /* Кнопка "Купить донат" - фиолетовая заливка */
        .btn-primary {
            background-color: #8a2be2;
            color: #ffffff;
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.4);
        }
        .btn-primary:hover {
            background-color: #9b4dff;
            box-shadow: 0 0 25px rgba(138, 43, 226, 0.7);
            transform: translateY(-2px);
        }

        /* Кнопка "IP сервера" - прозрачная с фиолетовой каймой */
        .btn-secondary {
            background-color: rgba(138, 43, 226, 0.1);
            color: #ffffff;
            border: 2px solid #d4a0ff;
            box-shadow: 0 0 10px rgba(138, 43, 226, 0.2);
        }
        .btn-secondary:hover {
            background-color: rgba(138, 43, 226, 0.3);
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.5);
            transform: translateY(-2px);
        }

        .ip-text {
            font-size: 0.9rem;
            color: #9b59b6;
            text-shadow: 0 0 10px rgba(155, 89, 182, 0.3);
            letter-spacing: 0.5px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <!-- Фон со звёздами -->
    <div class="stars"></div>

    <div class="container">
        <!-- Логотип (оставил твой ASTRO CITY) -->
        <h1 class="logo">ASTRO<br>CITY</h1>

        <div class="hero-text">
            <h2 class="hero-title-line">
                САМЫЙ<br>
                ЛЕГЕНДАРНЫЙ<br>
                <span class="highlight-word">ROLEPLAY</span><br>
                СЕРВЕР В MINECRAFT
            </h2>
            <p class="description">
                Стань бандитом, полицейским, чиновником, бизнесменом или выбери любую другую профессию. Здесь нет ограничений — ты сам выбираешь свой путь и создаёшь собственную историю.
            </p>
        </div>

        <div class="buttons">
            <a href="#" class="btn btn-primary">💰 Купить донат</a>
            <a href="#" class="btn btn-secondary">🛰️ IP сервера</a>
        </div>

        <p class="ip-text">mc.atlantworld.com</p>
    </div>

</body>
</html>
