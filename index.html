<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASTRO CITY RP</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
background:#0a0015;
overflow:hidden;
color:white;
}

/* canvas particles */
canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

/* центр */
.hero{
position:relative;
z-index:2;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

/* текст */
h1{
font-size:60px;
color:#c084ff;
text-shadow:0 0 25px #a855f7;
animation:fade 1.2s ease;
}

p{
max-width:600px;
opacity:.8;
margin-top:10px;
animation:fade 1.6s ease;
}

/* кнопки */
.buttons{
margin-top:25px;
display:flex;
gap:15px;
flex-wrap:wrap;
justify-content:center;
}

a{
text-decoration:none;
padding:12px 20px;
border-radius:12px;
background:#a855f7;
color:white;
font-weight:bold;
transition:.3s;
box-shadow:0 0 10px #a855f7;
}

a:hover{
transform:scale(1.05);
box-shadow:0 0 25px #a855f7;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<canvas id="p"></canvas>

<div class="hero">
  <h1>ASTRO CITY</h1>
  <p>Легендарный RolePlay сервер Minecraft. Полиция, мафия, бизнес — твоя история.</p>

  <div class="buttons">
    <a href="store.html">💸 Купить донат</a>
    <a href="#ip">📡 IP сервера</a>
  </div>

  <p id="ip">mc.atlantworld.com</p>
</div>

<script>
// particles
const c=document.getElementById("p");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let p=[];

for(let i=0;i<80;i++){
p.push({
x:Math.random()*c.width,
y:Math.random()*c.height,
r:Math.random()*2,
dx:(Math.random()-0.5),
dy:(Math.random()-0.5)
});
}

function anim(){
ctx.clearRect(0,0,c.width,c.height);

for(let i=0;i<p.length;i++){
let s=p[i];
s.x+=s.dx;
s.y+=s.dy;

if(s.x<0)s.x=c.width;
if(s.y<0)s.y=c.height;

ctx.fillStyle="#a855f7";
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
}

requestAnimationFrame(anim);
}
anim();
</script>

</body>
</html>
