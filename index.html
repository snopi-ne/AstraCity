<!DOCTYPE html>
<html lang="ru">
<head>

<title>AstraCity RP</title>

<style>
body {
  margin: 0;

  background: linear-gradient(135deg, #0a0014, #1a0033);

}

header {
  display:flex;
  justify-content:space-between;
  padding:20px;
  background: rgba(0,0,0,0.5);
}

.logo {

  font-size:22px;

.hero {
  text-align:center;
  padding:100px 20px;
}

.hero h1 {

  color:#d9b3ff;
}

.card {

  padding:20px;
  background:rgba(255,255,255,0.05);

}

</head>

<body>

<header>

  <div>
    <button>Discord</button>

</header>

<div class="hero">

<div class="card">Полиция</div>

</html>
