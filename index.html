<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstraCity RolePlay</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  overflow-x: hidden;
  background: black;
  color: white;
}

/* 🌆 фон города */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url("https://images.unsplash.com/photo-1504384308090-c894fdcc538d") center/cover no-repeat;
  filter: brightness(0.25) contrast(1.2);
  z-index: -2;
}

.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(0,0,0,0.4), rgba(10,0,20,0.95));
  z-index: -1;
}

/* ✨ частицы */
.particle {
  position: absolute;
  width: 3px;
  height: 3px;
  background: white;
  border-radius: 50%;
  opacity: 0.6;
  animation: fall linear infinite;
}

@keyframes fall {
  from { transform: translateY(-10vh); opacity: 0; }
  to { transform: translateY(110vh); opacity: 1; }
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  flex-direction: column;
  padding: 20px;
}

.big {
  font-size: 40px;
  text-transform: uppercase;
  color: white;
  text-shadow: 0 0 10px #b266ff;
}

.role {
  font-size: 55px;
  color: #b266ff;
  letter-spacing: 6px;
  animation: glow 2s infinite;
}

.desc {
  margin-top: 10px;
  max-width: 700px;
  opacity: 0.85;
  line-height: 1.5;
}

/* 💎 УЛЬТРА КНОПКИ */
.btn {
  margin-top: 25px;
  padding: 14px 35px;
  border: none;
  border-radius: 14px;
  color: white;
  font-size: 18px;
  cursor: pointer;
  background: linear-gradient(90deg, #6a0dad, #b266ff, #ff4dff);
  background-size: 200% 200%;
  animation: gradientMove 4s infinite;
  transition: 0.3s;
  box-shadow: 0 0 15px rgba(178,102,255,0.5);
}

.btn:hover {
  transform: scale(1.15);
  box-shadow: 0 0 30px #b266ff;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Discord */
.discord {
  margin-top: 12px;
  display: inline-block;
  padding: 14px 28px;
  background: #5865F2;
  border-radius: 12px;
  color: white;
  text-decoration: none;
  font-size: 16px;
  transition: 0.3s;
}

.discord:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px #5865F2;
}

/* 🎥 IP БЛОК */
.ip-box {
  margin-top: 30px;
  padding: 20px;
  border-radius: 16px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(178,102,255,0.4);
  backdrop-filter: blur(10px);
  display: inline-block;
  animation: fade 2s ease;
}

.ip-box h3 {
  color: #b266ff;
  margin-bottom: 10px;
}

.ip {
  font-size: 20px;
  letter-spacing: 2px;
}

/* секции */
.section {
  padding: 70px 20px;
  text-align: center;
}

.title {
  font-size: 24px;
  color: #b266ff;
  margin-bottom: 10px;
}

/* карточки */
.cards {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 15px;
}

.card {
  width: 260px;
  padding: 20px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(178,102,255,0.3);
  border-radius: 15px;
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
  box-shadow: 0 0 20px rgba(178,102,255,0.4);
}

/* glow */
@keyframes glow {
  0% { text-shadow: 0 0 10px #b266ff; }
  50% { text-shadow: 0 0 25px #d18cff; }
  100% { text-shadow: 0 0 10px #b266ff; }
}

@keyframes fade {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<script>
for (let i = 0; i < 50; i++) {
  let p = document.createElement("div");
  p.className = "particle";
  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = (3 + Math.random() * 7) + "s";
  document.body.appendChild(p);
}
</script>

<!-- HERO -->
<div class="hero">

  <h1 class="big">LEGENDARY</h1>
  <h2 class="role">ROLEPLAY</h2>

  <p class="desc">
    Minecraft RolePlay сервер нового поколения.<br><br>
    Стань кем хочешь и создай свою историю без ограничений.
  </p>

  <!-- 💰 КНОПКА ВЫШЕ -->
  <a href="store.html" class="btn">💰 Купить донат</a>

  <!-- DISCORD -->
  <a class="discord" href="https://discord.gg/zVWzNKr5D" target="_blank">
    💬 Наш Discord сервер
  </a>

  <!-- 🎥 IP БЛОК -->
  <div class="ip-box">
    <h3>IP СЕРВЕРА</h3>
    <div class="ip">mc.atlantworld.com</div>
  </div>

</div>

<!-- HOW TO PLAY -->
<div class="section">
  <div class="title">Как начать играть?</div>

  <div class="cards">

    <div class="card">
      <h3>Лаунчер</h3>
      <p>Моды, голосовой чат и автообновление</p>
    </div>

    <div class="card">
      <h3>Версия</h3>
      <p>1.20.1+</p>
    </div>

  </div>
</div>

</body>
</html>
