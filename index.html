<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASTRO CITY RP</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#0a0014;
  color:white;
  overflow:hidden;
}

/* Canvas particles */
#particles{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
}

/* Main container */
.container{
  position:relative;
  z-index:1;
  text-align:center;
  padding:60px 20px;
}

/* Logo */
h1{
  font-size:42px;
  color:#b46bff;
  letter-spacing:3px;
}

.subtitle{
  margin-top:10px;
  font-size:16px;
  opacity:0.8;
}

/* Menu */
.menu{
  margin-top:30px;
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
}

.menu a{
  text-decoration:none;
  color:white;
  padding:10px 18px;
  border:1px solid #b46bff;
  border-radius:10px;
  transition:0.3s;
  font-size:14px;
}

.menu a:hover{
  background:#b46bff;
  box-shadow:0 0 15px #b46bff;
}

/* IP block */
.ip{
  margin-top:35px;
  font-size:18px;
  color:#d7b3ff;
}

.button{
  display:inline-block;
  margin-top:20px;
  padding:12px 22px;
  background:#b46bff;
  color:white;
  border-radius:12px;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
}

.button:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px #b46bff;
}

/* Description */
.desc{
  margin-top:40px;
  max-width:700px;
  margin-left:auto;
  margin-right:auto;
  font-size:14px;
  opacity:0.85;
  line-height:1.5;
}

/* Mobile */
@media(max-width:600px){
  h1{font-size:28px;}
  .subtitle{font-size:13px;}
  .menu a{font-size:12px; padding:8px 12px;}
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">
  <h1>ASTRO CITY</h1>
  <div class="subtitle">RolePlay сервер в Minecraft</div>

  <div class="menu">
    <a href="#">Главная</a>
    <a href="#">Правила</a>
    <a href="#">Фракции</a>
    <a href="#">Донат</a>
    <a href="#">Форум</a>
  </div>

  <div class="ip">
    СЕРВЕР ОНЛАЙН<br>
    <b style="color:#fff;">mc.atlantworld.com</b>
  </div>

  <a class="button" href="#">Купить донат</a>

  <div class="desc">
    Стань бандитом, полицейским, чиновником, бизнесменом или выбери любую другую профессию.  
    Здесь нет ограничений — ты сам выбираешь свой путь и создаёшь собственную историю.
  </div>
</div>

<script>
// PARTICLES
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particlesArray = [];

class Particle{
  constructor(){
    this.x = Math.random()*canvas.width;
    this.y = Math.random()*canvas.height;
    this.size = Math.random()*2;
    this.speedX = (Math.random()-0.5)*0.5;
    this.speedY = (Math.random()-0.5)*0.5;
  }

  update(){
    this.x += this.speedX;
    this.y += this.speedY;

    if(this.x < 0) this.x = canvas.width;
    if(this.x > canvas.width) this.x = 0;
    if(this.y < 0) this.y = canvas.height;
    if(this.y > canvas.height) this.y = 0;
  }

  draw(){
    ctx.fillStyle = "#b46bff";
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fill();
  }
}

function init(){
  for(let i=0;i<80;i++){
    particlesArray.push(new Particle());
  }
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(let i=0;i<particlesArray.length;i++){
    particlesArray[i].update();
    particlesArray[i].draw();
  }
  requestAnimationFrame(animate);
}

init();
animate();

window.addEventListener("resize", function(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
