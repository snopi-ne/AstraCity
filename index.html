<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstraCity RolePlay</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
}

/* 🌆 фон города */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url("https://images.unsplash.com/photo-1504384308090-c894fdcc538d") center/cover no-repeat;
  filter: brightness(0.3) contrast(1.2);
  z-index: -2;
}

/* 🌌 затемнение */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(0,0,0,0.4), rgba(10,0,20,0.95));
  z-index: -1;
}

/* ✨ частицы */
.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: white;
  border-radius: 50%;
  opacity: 0.6;
  animation: move 10s linear infinite;
}

@keyframes move {
  from { transform: translateY(100vh); opacity: 0; }
  to { transform: translateY(-10vh); opacity: 1; }
}

/* 🧠 центр */
.container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  flex-direction: column;
}

/* ✍️ graffiti стиль */
.title {
  font-size: 60px;
  font-weight: bold;
  color: white;
  text-transform: uppercase;
  letter-spacing: 2px;
  animation: fade 2s ease;
  text-shadow:
    0 0 10px #b266ff,
    0 0 20px #7a2cff;
}

/* ROLEPLAY */
.roleplay {
  font-size: 40px;
  color: #b266ff;
  margin-top: 10px;
  letter-spacing: 5px;
  animation: fade 2.5s ease;
}

/* сервер */
.subtitle {
  margin-top: 10px;
  font-size: 18px;
  opacity: 0.8;
  animation: fade 3s ease;
}

@keyframes fade {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* кнопка */
.btn {
  margin-top: 25px;
  padding: 14px 30px;
  background: linear-gradient(90deg, #6a0dad, #b266ff);
  border: none;
  color: white;
  font-size: 18px;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
  animation: fade 3.5s ease;
}

.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px #b266ff;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<script>
/* ✨ создаём частицы */
for (let i = 0; i < 40; i++) {
  let p = document.createElement("div");
  p.className = "particle";
  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = (5 + Math.random() * 10) + "s";
  document.body.appendChild(p);
}
</script>

<div class="container">

  <div class="title">САМЫЙ ЛЕГЕНДАРНЫЙ</div>
  <div class="roleplay">ROLEPLAY</div>
  <div class="subtitle">СЕРВЕР В MINECRAFT</div>

  <button class="btn">ENTER WORLD</button>

</div>

</body>
</html>
