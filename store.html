<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ASTRA CITY STORE</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050814;
color:white;
overflow-x:hidden;
}

.store-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
linear-gradient(rgba(5,8,20,.85),rgba(5,8,20,.92)),
url('https://images.unsplash.com/photo-1477959858617-67f85cf4f1df');
background-size:cover;
background-position:center;
z-index:-1;
}

.header{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
width:92%;
height:80px;
background:rgba(10,15,30,.9);
backdrop-filter:blur(20px);
border-radius:25px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 25px;
z-index:999;
}

.logo{
font-size:32px;
font-weight:900;
color:#ff7b4a;
}

.icon{
font-size:30px;
cursor:pointer;
}

.content{
width:92%;
margin:auto;
padding-top:130px;
}

.categories{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-bottom:30px;
}

.category{
background:rgba(10,15,30,.9);
padding:20px;
border-radius:20px;
text-align:center;
font-size:22px;
font-weight:700;
}

.active{
background:linear-gradient(135deg,#7d2cff,#bf72ff);
}

.products{
display:grid;
grid-template-columns:1fr;
gap:25px;
}

.product-card{
background:rgba(10,15,30,.95);
border-radius:25px;
overflow:hidden;
border:1px solid rgba(255,255,255,.08);
}

.product-image{
height:180px;
display:flex;
align-items:center;
justify-content:center;
font-size:70px;
background:linear-gradient(135deg,#7d2cff,#bf72ff);
}

.product-card h2{
padding:20px 20px 10px;
font-size:34px;
}

.product-card p{
padding:0 20px;
color:#cccccc;
}

.price{
padding:20px;
font-size:32px;
font-weight:900;
color:#ff8a5c;
}

.buy-btn{
width:calc(100% - 40px);
margin:0 20px 20px;
height:60px;
border:none;
border-radius:15px;
font-size:22px;
font-weight:700;
color:white;
background:linear-gradient(135deg,#ff7b4a,#ff9d7a);
}

</style>
</head>

<body>

<div class="store-bg"></div>

<div class="header">
<div class="icon">☰</div>

<div class="logo">
ASTRA CITY
</div>

<div class="icon">🛒</div>
</div>

<div class="content">

<div class="categories">

<div class="category active">
💎 Привилегии
</div>

<div class="category">
🚗 Автомобили
</div>

<div class="category">
🏝️ Недвижимость
</div>

<div class="category">
🎟️ AstraPass
</div>

</div>

<div class="products">
