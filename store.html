<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Astra City Store</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#050816;
color:white;
overflow-x:hidden;

}

body::before{

content:"";
position:fixed;
inset:0;

background:
linear-gradient(
rgba(0,0,0,.75),
rgba(0,0,0,.85)
),
url("https://images.unsplash.com/photo-1514565131-fce0801e5785");

background-size:cover;
background-position:center;

z-index:-2;

}

.header{

position:fixed;

top:20px;
left:50%;

transform:translateX(-50%);

width:92%;
height:80px;

background:rgba(10,15,30,.85);

backdrop-filter:blur(20px);

border-radius:30px;

display:flex;
align-items:center;
justify-content:space-between;

padding:0 25px;

z-index:9999;

border:1px solid rgba(255,255,255,.08);

}

.logo{

font-size:32px;
font-weight:900;

color:#ff7a45;

}

.hero{

padding-top:140px;

display:flex;
justify-content:center;

}

.hero-card{

width:92%;
max-width:1400px;

height:550px;

border-radius:40px;

overflow:hidden;

position:relative;

background:
linear-gradient(
rgba(0,0,0,.45),
rgba(0,0,0,.75)
),
url("https://images.unsplash.com/photo-1519501025264-65ba15a82390");

background-size:cover;
background-position:center;

display:flex;
align-items:center;
justify-content:center;

text-align:center;

}

.hero-content h1{

font-size:80px;
font-weight:900;

margin-bottom:20px;

}

.hero-content p{

font-size:24px;

opacity:.9;

margin-bottom:30px;

}

.play-btn{

display:inline-block;

padding:18px 50px;

border-radius:20px;

text-decoration:none;

color:white;

font-size:22px;
font-weight:700;

background:
linear-gradient(
135deg,
#ff7a45,
#ff9671
);

}

.online{

margin-top:30px;

font-size:26px;

}

.green{

color:#45ff45;

}

</style>
</head>

<body>

<div class="header">

<div>☰</div>

<div class="logo">
ASTRA CITY
</div>

<div>🛒</div>

</div>

<section class="hero">

<div class="hero-card">

<div class="hero-content">

<h1>
ASTRA CITY STORE
</h1>

<p>
IP: play.astracity.ru
</p>

<a href="#shop" class="play-btn">
Перейти в магазин
</a>

<div class="online">
🟢 0 игроков онлайн
</div>

</div>

</div>

</section>

</body>
</html>
